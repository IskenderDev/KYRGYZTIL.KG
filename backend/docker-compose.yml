services:
  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_MEDIA_BASE_URL: /django-media
      VITE_PROXY_TARGET: http://backend:8000
      VITE_SITE_URL: http://localhost:5173
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kyrgyztil
      POSTGRES_USER: kyrgyztil
      POSTGRES_PASSWORD: kyrgyztil
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  frontend_node_modules:
